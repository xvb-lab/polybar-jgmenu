;==========================================================
;  Polybar — top bar
;  Style: Material Symbols Outlined + Nord palette
;==========================================================

[colors]
bg          = #33404e
fg          = #ffffff
fg-dim      = #4c566a
ok          = #a3be8c
warn        = #ebcb8b
alert       = #bf616a
ice         = #88c0d0
blue        = #81a1c1

[bar/main]
enable-ipc = true
monitor     =
width       = 100%
height      = 24
fixed-center = true
background  = ${colors.bg}
foreground  = ${colors.fg}

; font-0 is the default ; ;Y is vertical offset (positive = down)
font-0 = Google Sans:size=9;2
font-1 = Material Symbols Outlined:size=12;3
font-2 = Google Sans:weight=bold:size=10;2
font-3 = Dell Logo:size=12;5
font-4 = Material Symbols Outlined:size=16;5

modules-left   = logo workspaces tasklist
modules-center =
modules-right = weather sep hw_toggle uptime cpu memory temperature trash disk kernel kernelver updates powermgr volume network bluetooth notifications sep_tray date power

module-margin = 0
padding-left  = 4
padding-right = 0

cursor-click  = pointer
cursor-scroll = ns-resize

;----------------------------------------------------------
[module/weather]
type      = custom/script
exec      = ~/.config/polybar/scripts/weather.sh
interval  = 600
click-left = xdg-open https://www.bbc.co.uk/weather/2643743

[module/cpu]
type      = custom/script
exec      = ~/.config/polybar/scripts/cpu.sh
interval = 3
click-left = xfce4-taskmanager

[module/memory]
type      = custom/script
exec      = ~/.config/polybar/scripts/memory.sh
interval = 5
click-left = xfce4-taskmanager

[module/temperature]
type      = custom/script
exec      = ~/.config/polybar/scripts/temperature.sh
interval = 5
click-left = xfce4-taskmanager

[module/disk]
type      = custom/script
exec      = ~/.config/polybar/scripts/disk.sh
interval = 30
click-left = thunar /

[module/volume]
type        = custom/script
exec        = ~/.config/polybar/scripts/volume.sh
interval = 0.5
click-left  = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-right = pavucontrol
scroll-up   = ~/.config/polybar/scripts/vol-change.sh +2%
scroll-down = ~/.config/polybar/scripts/vol-change.sh -2%

[module/keyboard]
type      = custom/script
exec      = ~/.config/polybar/scripts/keyboard.sh
interval  = 5
click-left = xfce4-keyboard-settings

[module/date]
type     = custom/script
exec     = ~/.config/polybar/scripts/date.sh
interval = 30
click-left = gnome-calendar

[module/notifications]
type      = custom/script
exec      = ~/.config/polybar/scripts/notifications.sh
interval  = 1
click-left = ~/.config/polybar/scripts/notifications.sh toggle
click-right = ~/.config/polybar/scripts/notifications.sh mark-read
scroll-up = ~/.config/polybar/scripts/notifications.sh toggle-dnd

;==========================================================
; vim:ft=dosini

[module/logo]
type     = custom/script
exec     = ~/.config/polybar/scripts/logo.sh
interval = 99999
click-left = bash -c "pkill jgmenu; jgmenu_run"

[module/power]
type     = custom/script
exec     = ~/.config/polybar/scripts/power.sh
interval = 99999
click-left = xfce4-session-logout

[module/sep]
type     = custom/script
exec     = ~/.config/polybar/scripts/sep.sh
interval = 99999

[module/bluetooth]
type     = custom/script
exec     = ~/.config/polybar/scripts/bluetooth.sh
interval = 5
click-left = blueman-manager

[module/sep_tray]
type     = custom/script
exec     = ~/.config/polybar/scripts/sep_tray.sh
interval = 99999

[module/network]
type     = custom/script
exec     = ~/.config/polybar/scripts/network.sh
interval = 1
click-left = nm-connection-editor

[module/updates]
type     = custom/script
exec     = ~/.config/polybar/scripts/updates.sh
interval = 60
click-left = mintupdate

[module/hw_toggle]
type       = custom/script
exec       = ~/.config/polybar/scripts/hw_toggle.sh
interval   = 1
click-left = ~/.config/polybar/scripts/hw_toggle.sh click

[module/kernel]
type     = custom/script
exec     = ~/.config/polybar/scripts/kernel.sh
interval = 99999
click-left = xfce4-terminal -e 'bash -c "uname -a; echo; lsb_release -a; echo; read -n1 -p Premi_invio"'

[module/trash]
type     = custom/script
exec     = ~/.config/polybar/scripts/trash.sh
interval = 5
click-left = xdg-open "trash:///"
click-right = bash -c "gio trash --empty && notify-send 'Cestino svuotato'"

[module/powermgr]
type     = custom/script
exec     = ~/.config/polybar/scripts/powermgr.sh
interval = 99999
click-left = xfce4-power-manager-settings

[module/folder]
type     = custom/script
exec     = ~/.config/polybar/scripts/folder.sh
interval = 99999
click-left = thunar

[module/tasklist]
type     = custom/script
exec     = ~/.config/polybar/scripts/tasklist.sh
interval = 1


[module/workspaces]
type = internal/xworkspaces
label-active = %index%
label-active-foreground = #ffffff
label-active-font = 3
label-active-padding = 1
label-occupied = %index%
label-occupied-foreground = #ffffff
label-occupied-padding = 1
label-empty = %index%
label-empty-foreground = #737994
label-empty-padding = 1

[module/terminal]
type     = custom/script
exec     = ~/.config/polybar/scripts/terminal.sh
interval = 99999
click-left = xfce4-terminal

[module/firefox]
type     = custom/script
exec     = ~/.config/polybar/scripts/firefox.sh
interval = 99999
click-left = firefox

[module/uptime]
type     = custom/script
exec     = ~/.config/polybar/scripts/uptime.sh
interval = 30

[module/kernelver]
type     = custom/script
exec     = ~/.config/polybar/scripts/kernelver.sh
interval = 99999
click-left = xfce4-terminal -e 'bash -c "uname -a; echo; read -n1 -p Premi_invio"'
